<div class="sidebar-card">

  <div class="profile-header">
    <!-- <div class="avatar">KP</div> -->
    <h4>Provider Profile</h4>
    <p>Complete your profile to start receiving bookings.</p>
  </div>

  <div class="side-nav">
    <button type="button" class="side-nav-item" *ngFor="let item of menuItems"
      [class.active]="activeSection === item.id" (click)="selectSection(item.id)">
      <span class="ico">{{ item.icon }}</span>
      <span>{{ item.title }}</span>
    </button>
  </div>

</div>
