<div class="login-page">

    <!-- Left Side -->
    <div class="login-banner">

        <div class="overlay"></div>

        <div class="content">

            <h1>BookMyPro</h1>

            <h3>Identity & Access Management</h3>

            <p>
                Secure authentication platform built for enterprise
                applications.
            </p>

            <ul>

                <li>✓ JWT Authentication</li>

                <li>✓ Multi Session Management</li>

                <li>✓ OAuth2 Ready</li>

                <li>✓ Role Based Access Control</li>

            </ul>

        </div>

    </div>

    <!-- Right Side -->
    <div class="login-section">

        <div class="login-card">

            <div class="logo">
                🔐
            </div>

            <h2>Welcome Back</h2>

            <p>Sign in to your account</p>

            <form [formGroup]="form" (ngSubmit)="login()">

                <div class="input-group">

                    <label>Email Address</label>

                    <input type="email" formControlName="email" placeholder="Enter your email">

                </div>

                <div class="input-group">

                    <label>Password</label>

                    <input type="password" formControlName="password" placeholder="Enter password">

                </div>

                <div class="options">

                    <label>

                        <input type="checkbox">

                        Remember Me

                    </label>

                    <a href="#">Forgot Password?</a>

                </div>

                <button class="login-btn" [disabled]="store.loading()">

                    <span *ngIf="!store.loading()">
                        Login
                    </span>

                    <span *ngIf="store.loading()">

                        <span class="spinner"></span>

                        Signing In...

                    </span>

                </button>

            </form>

            <div class="error-box" *ngIf="store.error()">

                {{store.error()}}

            </div>

            <div>
                <button routerLink="/auth/register">Register</button>
            </div>
        </div>

    </div>

</div>
