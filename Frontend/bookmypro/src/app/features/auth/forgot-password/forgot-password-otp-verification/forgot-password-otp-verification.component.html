<div class="stage-otp">

  <div class="step-dots">

    <span class="active"></span>

    <span class="active"></span>

    <span></span>

  </div>

  <div class="fp-icon">

    ✉️

  </div>

  <h2>

    Enter verification code

  </h2>

  <p class="text-muted">

    We sent a 6-digit code to

    <strong>{{email}}</strong>

  </p>

  <form
    [formGroup]="form">

    <div
      class="otp-row"
      formArrayName="otp">

      <input
        *ngFor="let control of otpControls; let i=index"
        class="input"
        maxlength="1"
        inputmode="numeric"
        autocomplete="one-time-code"
        [formControlName]="i"
        (input)="moveNext($event,i)">

    </div>

    <div class="row row-between mt-4">

      <small>

        Didn't get it?

        <a
          (click)="resendOtp()">

          Resend

        </a>

      </small>

      <small>

        Resend in

        <strong>

          0:24

        </strong>

      </small>

    </div>

    <button
      type="button"
      class="btn btn-primary btn-lg btn-block mt-4"
      (click)="verifyOtp()">

      Verify & Update Password

    </button>

    <button
      type="button"
      class="btn btn-ghost btn-block mt-2"
      (click)="changeEmail()">

      ← Change Email

    </button>

  </form>

</div>
