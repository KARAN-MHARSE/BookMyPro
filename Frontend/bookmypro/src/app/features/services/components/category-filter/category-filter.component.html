<div class="category-filter">

    <button class="chip" [class.active]="isSelected(null)" (click)="selectCategory(null)">

        All

    </button>

    @for(category of categories; track category.id){

    <button class="chip" [class.active]="isSelected(category.id)" (click)="selectCategory(category.id)">

        @if(category.iconUrl){

        <img [src]="category.iconUrl" [alt]="category.name">

        }

        <span>

            {{ category.name }}

        </span>

    </button>

    }

</div>
