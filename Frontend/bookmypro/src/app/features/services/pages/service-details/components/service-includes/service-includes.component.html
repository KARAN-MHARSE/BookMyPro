<section class="includes-section">

    <div class="section-header">

        <h2>What's Included</h2>

        <p>
            Every booking includes these professional services.
        </p>

    </div>

    <div class="includes-grid">

        <div
            class="include-card"

            <div class="content">

                <h4>{{ item }}</h4>

                    Performed by trained professionals using quality equipment.
                </p>

            </div>

        </div>

    </div>

</section>
