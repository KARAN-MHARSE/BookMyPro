<div class="stepper-card">
  <div class="stepper-card__actions">
    <button
      type="button"
      class="btn btn-ghost"
      (click)="cancel()">
      Cancel
    </button>

    <div class="stepper-card__primary-actions">
      <button
        type="button"
        class="btn btn-outline">
        Save as draft
      </button>

      <button
        type="button"
        class="btn btn-primary"
        (click)="save()">
        Save
      </button>
    </div>
  </div>
</div>
