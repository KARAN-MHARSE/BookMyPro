<header class="site-header">
  <div class="container inner">
    <a class="brand" routerLink="/">
      <span class="mark">S</span>
      BookMyPro
    </a>
    <nav class="nav" aria-label="Primary">
      <a routerLink="/services" routerLinkActive="active">Services</a>
      <a routerLink="/categories" routerLinkActive="active">Categories</a>
      <a routerLink="/pricing" routerLinkActive="active">Pricing</a>
      <a routerLink="/providers" routerLinkActive="active">For Providers</a>
      <a routerLink="/contact" routerLinkActive="active">Contact</a>
    </nav>
    <div class="row nav-actions gap-2">
      <a class="btn btn-ghost" routerLink="/auth" *ngIf="!isLoggedIn">Sign in</a>
      <a class="btn btn-primary" routerLink="/auth/register" *ngIf="!isLoggedIn">Get started</a>
      <div class="profile-container" *ngIf="isLoggedIn">
        <img *ngIf="appStore.profileImage()" [src]="appStore.profileImage()" class="nav-avatar" alt="Profile Photo" (click)="toggleMenu()">
        <div *ngIf="!appStore.profileImage()" class="nav-avatar-placeholder" (click)="toggleMenu()">👤</div>
        <!-- Dropdown Menu -->
        <div class="profile-popup" *ngIf="isMenuOpen">
          <div class="popup-header">
            <span>Account Options</span>
            <button type="button" class="close-btn" (click)="closeMenu()">&times;</button>
          </div>
          <div class="popup-options">
            <button type="button" class="popup-opt-btn" (click)="navigateToProfile()">👤 View Profile</button>
            <button type="button" class="popup-opt-btn logout-btn" (click)="logout()">🚪 Logout</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>
